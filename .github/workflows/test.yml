name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# TAP-666: least-privilege GITHUB_TOKEN at workflow level. Jobs may widen this
# locally if they actually need more (none currently do).
permissions:
  contents: read

# TAP-667: pin bash as the default run shell across all steps. Steps use
# `[[ ]]`, `local`, and `${var:-default}`, so any runner where `sh` is the
# default (self-hosted dash) would silently fail or mis-pass.
defaults:
  run:
    shell: bash

env:
  # Coverage threshold - configurable, not hardcoded
  # Set to 0 to disable threshold enforcement
  #
  # NOTE: kcov cannot trace subprocess executions due to LD_PRELOAD limitations.
  # When bats runs tests, it spawns new bash processes that kcov cannot instrument.
  # This is a known limitation (see: https://github.com/bats-core/bats-core/issues/15)
  # Coverage is kept as informational-only; test pass rate is the quality gate.
  COVERAGE_THRESHOLD: 0
  KCOV_VERSION: "42"

jobs:
  test:
    runs-on: ubuntu-latest
    # TAP-666: cap unit + integration + deterministic evals at 20 min. Normal
    # run is ~5 min; 20 min gives us 4x slack before the default 360-min
    # ceiling could burn a runner slot.
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm install
        sudo apt-get update
        # gawk is required for PLANOPT-2 array-capture syntax (mawk lacks it).
        sudo apt-get install -y jq gawk

    - name: Run unit tests
      run: npm run test:unit

    - name: Run integration tests
      # TAP-537: Was masked with `|| true`. The mask hid 13 real regressions
      # (stale version assertion, missing exec bit on mock_claude.sh, missing
      # ralph_upgrade_project.sh fixture). Failures are now blocking — fix the
      # tests, not the gate.
      run: npm run test:integration

    - name: Run deterministic agent evals
      # TAP-537: Pin loop-correctness invariants (exit gate, circuit breaker,
      # tool restrictions, hooks). No LLM calls, ~5 min. Required.
      run: npm run test:evals:deterministic

    - name: Generate test report
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Integration tests passed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Deterministic evals passed" >> $GITHUB_STEP_SUMMARY

  coverage:
    runs-on: ubuntu-latest
    needs: test
    # TAP-666: kcov build-from-source + 1100+ test runs through it is the
    # longest job in this suite. 45 min covers network stalls while keeping
    # well under the 360-min default.
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: npm

    - name: Install dependencies
      run: |
        npm install
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Build and install kcov from source
      run: |
        # Install kcov build dependencies
        sudo apt-get install -y \
          cmake \
          g++ \
          binutils-dev \
          libcurl4-openssl-dev \
          libdw-dev \
          libiberty-dev \
          zlib1g-dev \
          libssl-dev

        # Clone and build kcov
        git clone --depth 1 --branch v${KCOV_VERSION} https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
        cd /tmp/kcov-src
        mkdir build && cd build
        cmake -DCMAKE_INSTALL_PREFIX=/usr/local ..
        make -j$(nproc)
        sudo make install

        # Verify installation
        /usr/local/bin/kcov --version

    - name: Verify kcov installation
      run: |
        which kcov
        kcov --version

    - name: Run tests with coverage
      run: |
        mkdir -p coverage

        # Use full path to bats since kcov subprocess doesn't inherit npm PATH
        BATS_CMD="$(pwd)/node_modules/.bin/bats"

        # kcov is informational only (see env comment above re: subprocess
        # tracing). Failures here must NOT fail the job, but TAP-537 requires
        # they be visible — capture stderr to a logged artifact so a silent
        # `|| true` can't hide a real coverage regression next time.
        run_kcov_step() {
            local label="$1"; shift
            if "$@" 2> "coverage/${label}.stderr.log"; then
                echo "kcov ${label}: ok"
            else
                local rc=$?
                echo "::warning::kcov ${label} exited ${rc} — see coverage/${label}.stderr.log artifact"
                tail -20 "coverage/${label}.stderr.log" || true
            fi
        }

        # Run CLI parsing tests under kcov
        run_kcov_step cli-parsing \
            kcov --include-path="$(pwd)/ralph_loop.sh,$(pwd)/lib" \
                 --exclude-pattern=tests/,node_modules/ \
                 coverage/cli-parsing \
                 bash -c "$BATS_CMD tests/unit/test_cli_parsing.bats"

        # Run all unit tests under kcov for comprehensive coverage
        run_kcov_step all-unit \
            kcov --include-path="$(pwd)/ralph_loop.sh,$(pwd)/lib" \
                 --exclude-pattern=tests/,node_modules/ \
                 coverage/all-unit \
                 bash -c "$BATS_CMD tests/unit/"

    - name: Parse coverage results
      id: coverage
      run: |
        # Extract coverage percentage from kcov JSON output
        COVERAGE_FILE="coverage/all-unit/kcov-merged/coverage.json"

        if [[ -f "$COVERAGE_FILE" ]]; then
          COVERAGE_PCT=$(jq -r '.percent_covered // "0"' "$COVERAGE_FILE" | cut -d'.' -f1)
          echo "coverage_percent=$COVERAGE_PCT" >> $GITHUB_OUTPUT
          echo "Coverage: ${COVERAGE_PCT}%"
        else
          # Fallback: try to find any coverage.json
          COVERAGE_FILE=$(find coverage -name "coverage.json" -type f 2>/dev/null | head -1)
          if [[ -n "$COVERAGE_FILE" && -f "$COVERAGE_FILE" ]]; then
            COVERAGE_PCT=$(jq -r '.percent_covered // "0"' "$COVERAGE_FILE" | cut -d'.' -f1)
            echo "coverage_percent=$COVERAGE_PCT" >> $GITHUB_OUTPUT
            echo "Coverage (from $COVERAGE_FILE): ${COVERAGE_PCT}%"
          else
            echo "coverage_percent=0" >> $GITHUB_OUTPUT
            echo "Warning: Could not find coverage results"
            # List what we do have for debugging
            find coverage -type f -name "*.json" 2>/dev/null || echo "No JSON files found"
            ls -laR coverage/ 2>/dev/null || echo "Coverage directory empty or not found"
          fi
        fi

    - name: Check coverage threshold
      run: |
        COVERAGE=${{ steps.coverage.outputs.coverage_percent }}
        THRESHOLD=${{ env.COVERAGE_THRESHOLD }}

        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
        echo "| Threshold | ${THRESHOLD}% |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [[ "$THRESHOLD" -eq 0 ]]; then
          echo "✅ Coverage threshold enforcement disabled" >> $GITHUB_STEP_SUMMARY
          echo "Coverage threshold enforcement disabled (COVERAGE_THRESHOLD=0)"
          exit 0
        fi

        if [[ -z "$COVERAGE" || "$COVERAGE" == "0" ]]; then
          echo "⚠️ Coverage measurement failed - skipping threshold check" >> $GITHUB_STEP_SUMMARY
          echo "Coverage measurement failed - skipping threshold check"
          exit 0
        fi

        if [[ "$COVERAGE" -lt "$THRESHOLD" ]]; then
          echo "❌ Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
          echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
          exit 1
        else
          echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%" >> $GITHUB_STEP_SUMMARY
          echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
        fi

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v4
      if: always()
      continue-on-error: true
      with:
        directory: coverage/all-unit
        fail_ci_if_error: false
        verbose: true
