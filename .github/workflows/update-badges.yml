name: Update Badges

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: [ "Test Suite" ]
    types: [ completed ]
    branches: [ main ]

# Only one badge update at a time
concurrency:
  group: update-badges
  cancel-in-progress: true

jobs:
  update-badges:
    runs-on: ubuntu-latest
    # Skip if the last commit was a badge-only update (prevent infinite loop)
    if: >
      !contains(github.event.head_commit.message, '[skip badges]') &&
      !contains(github.event.head_commit.message, 'chore: update badges')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm install
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Run tests and count
      id: tests
      run: |
        # Run the full test suite and capture TAP output
        TEST_OUTPUT=$(npm test 2>&1) || true

        # Extract test count from bats output (e.g. "849 tests, 0 failures")
        # Bats prints a summary line at the end of each file like "ok <N> ..."
        # The total count is the number of "ok" lines
        PASS_COUNT=$(echo "$TEST_OUTPUT" | grep -c "^ok " || echo "0")

        # If no "ok" lines found, try parsing "N tests" from summary
        if [ "$PASS_COUNT" -eq 0 ]; then
          PASS_COUNT=$(echo "$TEST_OUTPUT" | grep -oP '\d+ tests' | tail -1 | grep -oP '\d+' || echo "0")
        fi

        echo "test_count=$PASS_COUNT" >> "$GITHUB_OUTPUT"
        echo "Detected $PASS_COUNT passing tests"

    - name: Extract version
      id: version
      run: |
        # Read version from package.json (canonical source)
        VERSION=$(jq -r '.version' package.json)
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION"

    - name: Update README badges
      run: |
        TEST_COUNT="${{ steps.tests.outputs.test_count }}"
        VERSION="${{ steps.version.outputs.version }}"

        # URL-encode the test count label (spaces become %20)
        TEST_LABEL="${TEST_COUNT}%20passing"

        # Update version badge
        sed -i "s|https://img.shields.io/badge/version-[^\"]*-blue|https://img.shields.io/badge/version-${VERSION}-blue|g" README.md

        # Update test count badge
        sed -i "s|https://img.shields.io/badge/tests-[^\"]*-green|https://img.shields.io/badge/tests-${TEST_LABEL}-green|g" README.md

        echo "Updated badges: version=${VERSION}, tests=${TEST_COUNT} passing"

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet README.md; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "No badge changes needed"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Badge changes detected:"
          git diff README.md
        fi

    - name: Commit badge updates
      if: steps.changes.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "chore: update badges [skip badges]

Updated version and test count badges in README.md.
This commit is auto-generated by the update-badges workflow."
        git push
